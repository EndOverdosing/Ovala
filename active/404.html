<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080808">
  <meta name="googlebot" content="noindex, nofollow, nosnippet">
  <title>404 — Ovala</title>
  <link rel="icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/active/styling/index.css">
</head>

<body>

  <canvas id="c"></canvas>

  <span class="site-label">OVALA — 404</span>

  <div id="ascii-canvas">
    <canvas id="ascii-canvas-el"></canvas>
  </div>

  <div id="ui">
    <p id="uv-error"></p>
    <pre id="uv-error-code"></pre>
    <div class="bottom-row">
      <div class="left-col">
        <p class="err-msg">page not found</p>
        <button class="ascii-btn" id="back-btn" onclick="history.back()">
          <canvas id="btn-back-canvas" width="56" height="10"></canvas>
        </button>
      </div>
      <div class="meta">
        <div id="clock">--:--:--</div>
        <div>UV/3.0</div>
      </div>
    </div>
  </div>

  <script src="/active/uv/uv.bundle.js" charset="UTF-8"></script>
  <script src="/active/uv/uv.config.js"></script>
  <script src="/active/js/register-sw.js"></script>
  <script src="/active/js/404.js"></script>
  <script src="/active/js/plasma.js"></script>

</body>

</html>
